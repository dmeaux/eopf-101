name: Quarto Test Render

on:
  workflow_dispatch:
  pull_request:

jobs:
  check-diff:
    runs-on: ubuntu-latest
    outputs:
      build: ${{ steps.check.outputs.build }}
      tag: ${{ steps.check.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Check for relevant file changes
        id: check
        run: |
          git fetch origin ${{ github.base_ref }}
          CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)

          if echo "$CHANGED_FILES" | grep -qE '^pyproject\.toml$|^uv\.lock$|^deployment/Dockerfile(_|$)|^deployment/environment\.yaml$'; then
            echo "Building image as we've modified pyproject.toml or deployment Dockerfile in this PR"
            echo "build=true" >> $GITHUB_OUTPUT
            echo "tag=pr-${{ github.run_id }}" >> $GITHUB_OUTPUT
          else
            echo "Using latest image"
            echo "build=false" >> $GITHUB_OUTPUT
            echo "tag=latest" >> $GITHUB_OUTPUT
          fi

  prepare-docker-image:
    runs-on: ubuntu-latest
    needs: check-diff
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        if: needs.check-diff.outputs.build == 'true'

      - name: Login to OVH Harbor docker registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        if: needs.check-diff.outputs.build == 'true'
        with:
          registry: ${{ secrets.OVH_HARBOR_REGISTRY }}
          username: ${{ secrets.OVH_HARBOR_USERNAME }}
          password: ${{ secrets.OVH_HARBOR_PASSWORD }}

      # We use the R image as this contains the same Python Dependencies as the Python one, so should work for everything
      - name: build image
        working-directory: deployment
        if: needs.check-diff.outputs.build == 'true'
        run: |
          make build-and-push-docker-image TAG=${{ needs.check-diff.outputs.tag }} PROJECT="r"

  test-render:
    needs: [check-diff, prepare-docker-image]
    runs-on: eopf-large
    if: needs.check-diff.result == 'success' && (needs.prepare-docker-image.result == 'success' || needs.prepare-docker-image.result == 'skipped')
    container:
      # We use the R image as this contains the same Python Dependencies as the Python one, so should work for everything
      image: 4zm3809f.c1.de1.container-registry.ovh.net/eopf-toolkit-r/eopf-toolkit-r:${{ needs.check-diff.outputs.tag }}
      options: --entrypoint "" --user root

    steps:
      # Quarto uses these but we probably don't want them baked into our image
      - name: Install quarto system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
          git \
          gh \
          curl \
          jq \
          libfontconfig1 \
          libfreetype6 \
          libx11-6 \
          libxrender1 \
          libxext6 \
          ghostscript \
          zlib1g

      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Install quarto python dependencies
        run: |
          pip install uv
          uv sync
          pip install nbstripout

      - name: Verify Julia installation
        run: |
          echo "🔍 Checking Julia installation..."
          julia --version
          julia -e 'using Pkg; Pkg.status()'
          julia -e 'using HTTP, JSON3, Zarr, CairoMakie, Statistics; println("✅ Core Julia packages available")'
          echo "✅ Julia environment ready"

      - name: Register Julia kernel
        run: julia -e 'using IJulia; installkernel("julia", specname="julia")'

      - name: Validate notebooks are clean
        shell: bash
        run: |
          echo "🔍 Checking that all notebooks are clean (no outputs)..."
          # Find all notebooks excluding backups and build artifacts
          notebooks=$(find . -name "*.ipynb" -not -path "./_book/*" -not -name "*backup*.ipynb" -not -path "./.git/*" -not -path "./.venv/*")
          if [ -z "$notebooks" ]; then
            echo "ℹ️  No notebooks found to validate"
            exit 0
          fi
          echo "Found notebooks: $notebooks"
          # Use nbstripout --verify which exits with non-zero if notebooks have outputs
          if nbstripout --verify $notebooks; then
            echo "✅ All notebooks are clean!"
          else
            echo ""
            echo "❌ Some notebooks contain outputs or execution counts!"
            echo ""
            echo "🔧 To fix this:"
            echo "  1. Install nbstripout: pip install nbstripout"
            echo "  2. Clean notebooks: nbstripout *.ipynb"
            echo "  3. Commit the changes"
            echo ""
            echo "💡 For automatic cleaning, set up git hooks: nbstripout --install"
            exit 1
          fi

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@8a96df13519ee81fd526f2dfca5962811136661b # v2
        with:
          tinytex: true

      - name: Trust git repo
        run: |
          git config --global --add safe.directory /__w/eopf-101/eopf-101

      - name: Identify new/modified .ipynb and .qmd files
        id: changed
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          else
            BASE="${{ github.event.before }}"
            HEAD="${{ github.sha }}"
          fi

          echo "Diffing range: $BASE..$HEAD"
          git --no-pager show --name-only --pretty=oneline "$BASE..$HEAD" | sed 's/^/  /' || true

          # 1) Get ALL changed paths (null-delimited)
          git -c core.quotepath=off diff -z --name-only --diff-filter=AMR "$BASE" "$HEAD" -- > all.lst

          # 2) Filter to *.qmd / *.ipynb safely (null-aware)
          : > changed.lst
          while IFS= read -r -d '' f; do
            case "$f" in
              *.qmd|*.ipynb) printf '%s\0' "$f" >> changed.lst ;;
            esac
          done < all.lst

          if [[ -s changed.lst ]]; then
            echo "Changed notebooks/files:"
            tr '\0' '\n' < changed.lst | sed 's/^/  /'
          else
            echo "none=true" >> "$GITHUB_OUTPUT"
            echo "No matching files changed."
          fi

      - name: Render changed files (standalone)
        if: steps.changed.outputs.none != 'true'
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          
          echo "============================================"
          echo "📋 Files to render:"
          tr '\0' '\n' < changed.lst | sed 's/^/  /'
          echo "============================================"
          echo ""
          
          while IFS= read -r -d '' f; do
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "🔄 Rendering: $f"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            
            # Check if file exists
            if [[ ! -f "$f" ]]; then
              echo "❌ File not found: $f"
              continue
            fi
            
            # Show file size
            ls -lh "$f"
            echo ""
            
            # Render with verbose output
            echo "Running: quarto render \"$f\" --to html --execute"
            quarto render "$f" --to html --execute || {
              echo "❌ Render failed for $f"
              continue
            }
            
            echo ""
            echo "✅ Render complete for $f"
            echo ""
            
            # List what was created
            base_name="${f%.ipynb}"
            base_name="${base_name%.qmd}"
            files_dir="${base_name}_files"
            html_file="${base_name}.html"
            
            echo "📁 Checking for outputs:"
            if [[ -f "$html_file" ]]; then
              echo "  ✅ HTML: $html_file ($(du -h "$html_file" | cut -f1))"
            else
              echo "  ❌ HTML: $html_file (not found)"
            fi
            
            if [[ -d "$files_dir" ]]; then
              echo "  ✅ Files dir: $files_dir"
              echo "     Contents:"
              find "$files_dir" -type f -exec ls -lh {} \; | awk '{printf "       %s %s\n", $5, $9}'
            else
              echo "  ❌ Files dir: $files_dir (not found)"
            fi
            echo ""
            
          done < changed.lst
          
          echo "============================================"
          echo "✅ All rendering complete"
          echo "============================================"
        env:
          BUCKET_NAME: ${{ secrets.RENDER_BUCKET_NAME }}
          ACCESS_KEY: ${{ secrets.RENDER_BUCKET_ACCESS_KEY }}
          SECRET_KEY: ${{ secrets.RENDER_BUCKET_SECRET_KEY }}
          BUCKET_ENDPOINT: ${{ secrets.RENDER_BUCKET_ENDPOINT }}

      - name: Debug - Show all generated files
        if: steps.changed.outputs.none != 'true'
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          echo "============================================"
          echo "🔍 COMPREHENSIVE FILE SYSTEM CHECK"
          echo "============================================"
          echo ""
          
          echo "Current directory: $(pwd)"
          echo ""
          
          echo "_book directory structure:"
          if [[ -d "_book" ]]; then
            echo "  ✅ _book exists"
            find _book -type f -name "*.html" -o -name "*.png" -o -name "*.svg" | head -50
          else
            echo "  ❌ No _book directory"
          fi
          echo ""
          
          echo "All PNG files in _book:"
          find _book -type f -name "*.png" 2>/dev/null | head -20 || echo "  (none)"
          echo ""
          
          echo "All SVG files in _book:"
          find _book -type f -name "*.svg" 2>/dev/null | head -20 || echo "  (none)"
          echo ""

      - name: Debug - Show rendered outputs
        if: steps.changed.outputs.none != 'true'
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          echo "============================================"
          echo "📁 DETAILED OUTPUT INSPECTION"
          echo "============================================"
          echo ""
          
          # Show current directory
          echo "Current directory: $(pwd)"
          echo ""
          
          # Check if _book directory exists
          echo "Checking _book directory:"
          if [[ -d "_book" ]]; then
            echo "  ✅ _book directory exists"
            echo "  Contents:"
            ls -la _book/ | head -20
            echo ""
            echo "  Looking for Julia outputs in _book:"
            find _book -type f -name "*julia*" | head -20
          else
            echo "  ⚠️  _book directory does not exist"
          fi
          echo ""
          
          # Show all *_files directories created (including in _book)
          echo "Generated _files directories:"
          if find . -type d -name "*_files" ! -path "./.venv/*" ! -path "./.git/*" -print | grep -q .; then
            find . -type d -name "*_files" ! -path "./.venv/*" ! -path "./.git/*" | while read dir; do
              echo "  📂 $dir"
              du -sh "$dir" | awk '{print "     Size: " $1}'
            done
          else
            echo "  ⚠️  No _files directories found"
          fi
          echo ""
          
          # Show figure-html directories specifically (including in _book)
          echo "Figure output directories:"
          if find . -type d -name "figure-html" ! -path "./.venv/*" ! -path "./.git/*" -print | grep -q .; then
            find . -type d -name "figure-html" ! -path "./.venv/*" ! -path "./.git/*" | sed 's/^/  ✅ /'
          else
            echo "  ⚠️  No figure-html directories found"
          fi
          echo ""
          
          # List all files in figure-html directories with sizes
          echo "Files in figure-html directories:"
          found_any=false
          while IFS= read -r dir; do
            if [[ -d "$dir" ]]; then
              found_any=true
              echo "  📁 $dir:"
              if ls -lh "$dir" 2>/dev/null | tail -n +2 | grep -q .; then
                ls -lh "$dir" 2>/dev/null | tail -n +2 | awk '{printf "     %s  %s\n", $5, $9}'
              else
                echo "     (empty directory)"
              fi
            fi
          done < <(find . -type d -name "figure-html" ! -path "./.venv/*" ! -path "./.git/*")
          if [[ "$found_any" == "false" ]]; then
            echo "  ⚠️  No figure-html directories to inspect"
          fi
          echo ""
          
          # Show HTML outputs (check both source dir and _book dir)
          echo "Generated HTML files:"
          while IFS= read -r -d '' f; do
            # Remove extension and add .html once
            base="${f%.ipynb}"
            base="${base%.qmd}"
            html_file="${base}.html"
            book_html_file="_book/${base}.html"
            
            if [[ -f "$html_file" ]]; then
              size=$(du -h "$html_file" | cut -f1)
              echo "  ✅ $html_file ($size)"
            elif [[ -f "$book_html_file" ]]; then
              size=$(du -h "$book_html_file" | cut -f1)
              echo "  ✅ $book_html_file ($size)"
            else
              echo "  ❌ $html_file (not found in source or _book)"
            fi
          done < changed.lst
          echo ""
          echo "============================================"

      - name: Check for oversized figure files
        if: steps.changed.outputs.none != 'true'
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          echo "🔍 Checking for oversized figure files..."

          # Find all SVG files in rendered output directories (including _book)
          oversized_files=()
          while IFS= read -r svg_file; do
            if [[ -f "$svg_file" ]]; then
              # Use stat command compatible with both Linux and macOS
              size_bytes=$(stat -c%s "$svg_file" 2>/dev/null || stat -f%z "$svg_file" 2>/dev/null)
              size_mb=$((size_bytes / 1048576))
              
              # Check if file is larger than 10MB (will cause issues at 100MB GitHub limit)
              if [[ $size_bytes -gt 10485760 ]]; then
                oversized_files+=("$svg_file (${size_mb}MB)")
              fi
            fi
          done < <(find . -name "*.svg" -path "*_files/figure-html/*" -type f ! -path "./.venv/*")

          if [[ ${#oversized_files[@]} -gt 0 ]]; then
            echo ""
            echo "❌ Found oversized SVG files that will cause GitHub push failures (>10MB):"
            printf '  %s\n' "${oversized_files[@]}"
            echo ""
            echo "💡 Fix: Add these lines to the document's YAML header:"
            echo "   format:"
            echo "     html:"
            echo "       fig-format: png"
            echo "       fig-dpi: 150"
            echo ""
            echo "   Or ensure _quarto.yml has global PNG settings."
            exit 1
          else
            echo "✅ No oversized figure files found"
          fi

      - name: Figure format summary
        if: steps.changed.outputs.none != 'true'
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          echo "📊 Figure format summary:"
          echo ""
          
          # Count PNG files (including _book)
          png_count=$(find . -name "*.png" -path "*_files/figure-html/*" -type f ! -path "./.venv/*" | wc -l)
          echo "  PNG files: $png_count"
          
          # Count SVG files (including _book)
          svg_count=$(find . -name "*.svg" -path "*_files/figure-html/*" -type f ! -path "./.venv/*" | wc -l)
          echo "  SVG files: $svg_count"

          # Show SVG files with sizes if any exist
          if [[ $svg_count -gt 0 ]]; then
            echo ""
            echo "  SVG files found:"
            while IFS= read -r svg_file; do
              if [[ -f "$svg_file" ]]; then
                size_bytes=$(stat -c%s "$svg_file" 2>/dev/null || stat -f%z "$svg_file" 2>/dev/null)
                size_kb=$((size_bytes / 1024))
                echo "    - $svg_file (${size_kb}KB)"
              fi
            done < <(find . -name "*.svg" -path "*_files/figure-html/*" -type f ! -path "./.venv/*")
          fi

          echo ""
          echo "✅ Figure format check complete"
