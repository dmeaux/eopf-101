name: Publish Docker Images and Book

on:
  push:
    branches:
      - main

permissions: {}

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      image_changes: ${{ steps.filter.outputs.image_changes }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Check changed paths
        id: filter
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3
        with:
          filters: |
            image_changes:
              - 'pyproject.toml'
              - 'uv.lock'
              - 'deployment/(Dockerfile_*|environment*)'

  publish-images:
    needs: detect-changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Login to GHCR
        if: needs.detect-changes.outputs.image_changes == 'true'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout code
        if: needs.detect-changes.outputs.image_changes == 'true'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Extract short commit hash
        if: needs.detect-changes.outputs.image_changes == 'true'
        id: commit
        run: echo "hash=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        if: needs.detect-changes.outputs.image_changes == 'true'
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build and push python docker image
        if: needs.detect-changes.outputs.image_changes == 'true'
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: deployment/Dockerfile_python
          push: true
          tags: |
            ghcr.io/eopf-toolkit/eopf-toolkit-python:release-${{ steps.commit.outputs.hash }}
            ghcr.io/eopf-toolkit/eopf-toolkit-python:latest
          platforms: linux/amd64
          cache-from: type=registry,ref=ghcr.io/eopf-toolkit/eopf-toolkit-python:cache
          cache-to: type=registry,ref=ghcr.io/eopf-toolkit/eopf-toolkit-python:cache,mode=max

      - name: Build and push r docker image
        if: needs.detect-changes.outputs.image_changes == 'true'
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: deployment/Dockerfile_r
          push: true
          tags: |
            ghcr.io/eopf-toolkit/eopf-toolkit-r:release-${{ steps.commit.outputs.hash }}
            ghcr.io/eopf-toolkit/eopf-toolkit-r:latest
          platforms: linux/amd64
          cache-from: type=registry,ref=ghcr.io/eopf-toolkit/eopf-toolkit-r:cache
          cache-to: type=registry,ref=ghcr.io/eopf-toolkit/eopf-toolkit-r:cache,mode=max

  publish-book:
    needs: publish-images
    runs-on: eopf-large
    if: needs.publish-images.result == 'success'
    container:
      # We use the R image as this contains the same Python Dependencies as the Python one, so should work for everything
      image: ghcr.io/eopf-toolkit/eopf-toolkit-r:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      options: --entrypoint "" --user root
    permissions:
      contents: write
      pages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}


      - name: Install quarto dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
          gh \
          curl \
          jq \
          libfontconfig1 \
          libfreetype6 \
          libx11-6 \
          libxrender1 \
          libxext6 \
          ghostscript \
          zlib1g \
          git-all
          pip install uv
          uv sync

      - name: Initialize Git Repository
        run: |
          cd $GITHUB_WORKSPACE
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global --add safe.directory $GITHUB_WORKSPACE
          git config --global url."https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"
          git fetch origin

      - name: Verify Julia installation
        run: |
          echo "🔍 Checking Julia installation..."
          julia --version
          julia -e 'using Pkg; Pkg.status()'
          julia -e 'using HTTP, JSON3, Zarr, CairoMakie, Statistics; println("✅ Core Julia packages available")'
          echo "✅ Julia environment ready"

      - name: Register Julia kernel
        run: julia -e 'using IJulia; installkernel("julia", specname="julia")'

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@8a96df13519ee81fd526f2dfca5962811136661b # v2
        with:
          tinytex: true

      - name: Render and Publish
        uses: quarto-dev/quarto-actions/publish@8a96df13519ee81fd526f2dfca5962811136661b # v2
        with:
          target: gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BUCKET_NAME: ${{ secrets.RENDER_BUCKET_NAME }}
          ACCESS_KEY: ${{ secrets.RENDER_BUCKET_ACCESS_KEY }}
          SECRET_KEY: ${{ secrets.RENDER_BUCKET_SECRET_KEY }}
          BUCKET_ENDPOINT: ${{ secrets.RENDER_BUCKET_ENDPOINT }}
